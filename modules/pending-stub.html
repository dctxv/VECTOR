  <sc-if value="{{ stubOpen }}" hint-placeholder-val="{{ false }}">
    <div style="position:fixed;inset:0;z-index:60;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px;">
      <span style="position:absolute;left:24px;top:24px;width:40px;height:40px;border-top:1.5px solid var(--accent);border-left:1.5px solid var(--accent);animation:mv-converge .5s steps(4) both;"></span>
      <span style="position:absolute;right:24px;top:24px;width:40px;height:40px;border-top:1.5px solid var(--accent);border-right:1.5px solid var(--accent);animation:mv-converge .5s steps(4) both;"></span>
      <span style="position:absolute;left:24px;bottom:24px;width:40px;height:40px;border-bottom:1.5px solid var(--accent);border-left:1.5px solid var(--accent);animation:mv-converge .5s steps(4) both;"></span>
      <span style="position:absolute;right:24px;bottom:24px;width:40px;height:40px;border-bottom:1.5px solid var(--accent);border-right:1.5px solid var(--accent);animation:mv-converge .5s steps(4) both;"></span>
      <div style="font-size:11px;color:var(--accent);letter-spacing:2px;margin-bottom:14px;">LOCK <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);vertical-align:middle;margin:0 4px;"></span> 100%</div>
      <div style="font-family:'Archivo',sans-serif;font-weight:900;text-transform:uppercase;font-size:clamp(34px,10vw,64px);line-height:.9;letter-spacing:-1px;color:var(--ink);max-width:9ch;"><span id="mv-stub-name"></span><span style="animation:mv-blink .9s steps(1) infinite;color:var(--accent);">_</span></div>
      <div style="font-size:10px;color:var(--accent-dim);letter-spacing:2px;margin-top:22px;">MODULE OFFLINE // PENDING ANALYSIS</div>
      <div style="font-size:9px;color:var(--muted2);letter-spacing:1px;margin-top:6px;">v0.3 // this target is resolved — its module is under construction</div>
      <button onClick="{{ closeStub }}" style="margin-top:30px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--accent);background:transparent;border:1px solid var(--accent);padding:12px 22px;cursor:pointer;pointer-events:auto;">&lt; RETURN TO FIELD</button>
    </div>
  </sc-if>
